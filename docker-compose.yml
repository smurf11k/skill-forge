services:
  postgres:
    image: postgres:16
    container_name: skillforge_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: skillforge
      POSTGRES_USER: skillforge_user
      POSTGRES_PASSWORD: skillforge_pass
    ports:
      - "5432:5432"
    volumes:
      - skillforge_pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/mock_data.sql:/docker-entrypoint-initdb.d/02-mock-data.sql:ro

volumes:
  skillforge_pgdata:
